name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps

      - run: pnpm nx format:check --base="remotes/origin/main"
      - run: pnpm nx run-many -t lint test build typecheck e2e
      - run: bash plugins/sdlc/scripts/check-agent-skill-preloads.sh
      - run: bash plugins/sdlc/scripts/check-plugin-docs-format.sh
      - run: bash plugins/sdlc/scripts/__tests__/docs-sync-fixtures.test.sh
