name: nightshift-ai
services:
  db:
    container_name: nightshift_postgres
    image: postgres:18.4
    restart: always
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME:-postgresql}
      - POSTGRES_DB=${DATABASE_NAME:-nightshift}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-password123}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 2s
      timeout: 3s
      retries: 15
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=logical'
      - '-c'
      - 'max_wal_senders=10'
      - '-c'
      - 'max_replication_slots=10'
    volumes:
      # postgres:18+ expects the mount at /var/lib/postgresql (data lives in a
      # versioned subdirectory, enabling pg_upgrade --link across majors).
      - db:/var/lib/postgresql
  dbhub:
    image: bytebase/dbhub:latest
    init: true
    ports:
      - '127.0.0.1:9080:8080'
    environment:
      DB_TYPE: postgres
      DB_HOST: ${DATABASE_HOST:-db}
      DB_PORT: ${DATABASE_PORT:-5432}
      DB_USER: ${DATABASE_USERNAME:-postgresql}
      DB_PASSWORD: ${DATABASE_PASSWORD:-password123}
      DB_NAME: ${DATABASE_NAME:-nightshift}
    volumes:
      - ./dbhub.toml:/app/dbhub.toml:ro
    command:
      ['--transport', 'http', '--port', '8080', '--config', '/app/dbhub.toml']
volumes:
  db:
    driver: local
networks:
  default:
    name: nightshift_network
